<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini-Tienda — Catálogo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
  <a class="navbar-brand fw-bold">🛒 Mini-Tienda</a>
  <div id="nav-links" class="d-flex gap-2"></div>
</nav>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Catálogo de productos</h2>
    <span id="saldo-badge" class="badge bg-success fs-6 d-none"></span>
  </div>

  <div id="mensaje-compra" class="alert d-none"></div>
  <div id="catalogo" class="row row-cols-1 row-cols-md-3 g-4">
    <p class="text-muted">Cargando productos...</p>
  </div>
</div>

<script src="script.js"></script>
<script>
  async function init() {
    renderNav();
    const user = await getMe();
    if (user) {
      document.getElementById("saldo-badge").textContent = `💰 Saldo: ${user.saldo.toFixed(2)} €`;
      document.getElementById("saldo-badge").classList.remove("d-none");
    }
    cargarCatalogo(user);
  }

  async function cargarCatalogo(user) {
    const res  = await fetch(`${API}/productos`);
    const data = await res.json();
    const div  = document.getElementById("catalogo");

    if (!data.length) { div.innerHTML = "<p class='text-muted'>No hay productos disponibles.</p>"; return; }

    div.innerHTML = data.map(p => `
      <div class="col">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <h5 class="card-title">${escapeHtml(p.nombre)}</h5>
            <p class="card-text text-muted">${escapeHtml(p.descripcion)}</p>
            <p class="fw-bold text-success">${p.precio.toFixed(2)} €</p>
            <small class="text-muted">Vendedor: ${escapeHtml(p.vendedor)}</small>
          </div>
          ${user ? `
          <div class="card-footer">
            <button class="btn btn-primary btn-sm w-100"
              onclick="comprar(${p.id})">Comprar</button>
          </div>` : `
          <div class="card-footer text-muted small">
            <a href="login.html">Inicia sesión</a> para comprar
          </div>`}
        </div>
      </div>
    `).join("");
  }

  async function comprar(id) {
    const res  = await fetch(`${API}/comprar/${id}`, { method: "POST", credentials: "include" });
    const data = await res.json();
    const alerta = document.getElementById("mensaje-compra");
    alerta.className = `alert ${res.ok ? "alert-success" : "alert-danger"}`;
    alerta.textContent = data.mensaje || data.error;
    alerta.classList.remove("d-none");
    if (res.ok) setTimeout(() => location.reload(), 1500);
  }

  init();
</script>
</body>
</html>
