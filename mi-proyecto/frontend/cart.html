<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini-Tienda — Mis compras</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4 mb-4">
  <a class="navbar-brand fw-bold" href="index.html">🛒 Mini-Tienda</a>
  <div id="nav-links" class="d-flex gap-2"></div>
</nav>

<div class="container" style="max-width:700px">
  <h2 class="mb-4">Mis compras</h2>
  <div id="compras"><p class="text-muted">Cargando...</p></div>
</div>

<script src="script.js"></script>
<script>
  async function init() {
    const user = await getMe();
    if (!user) { location.href = "login.html"; return; }
    renderNav();

    const res  = await fetch(`${API}/mis-compras`, { credentials: "include" });
    const data = await res.json();
    const div  = document.getElementById("compras");

    if (!data.length) { div.innerHTML = "<p class='text-muted'>Todavía no has comprado nada.</p>"; return; }

    div.innerHTML = `<table class="table table-bordered">
      <thead class="table-dark"><tr><th>#</th><th>Producto</th><th>Vendedor</th><th>Precio</th><th>Fecha</th></tr></thead>
      <tbody>
        ${data.map(p => `
          <tr>
            <td>${p.id}</td>
            <td>${escapeHtml(p.producto)}</td>
            <td>${escapeHtml(p.vendedor)}</td>
            <td>${p.precio_total.toFixed(2)} €</td>
            <td>${new Date(p.fecha).toLocaleDateString("es-ES")}</td>
          </tr>`).join("")}
      </tbody>
    </table>`;
  }

  init();
</script>
</body>
</html>
