version: "3.9"

services:
  api:
    build: ./backend
    container_name: tienda_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app   # los cambios en tu código se reflejan sin reconstruir
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=cambia_esto_por_algo_secreto_largo

  web:
    image: nginx:alpine
    container_name: tienda_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro  # sirve los HTML estáticos
    depends_on:
      - api
